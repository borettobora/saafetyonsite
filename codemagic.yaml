workflows:
  ios-workflow:
    name: SafetyOnSite iOS
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.borettohse.safetyonsite
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: URJGSWZK8M
        key_id: URJGSWZK8M
        issuer_id: 685baa21-2a3b-4f41-8b94-d0da69079e11
        submit_to_testflight: true
