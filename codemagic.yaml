workflows:
  ios-workflow:
    name: SafetyOnSite iOS
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.borettohse.safetyonsite
      node: 22
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Set version
        script: |
          cd ios/App
          agvtool new-version -all 2
          agvtool new-marketing-version 1.3.0
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
